# Requests reviewers and reminds of merge policy when a PR is opened (no branch protection on free org).
name: PR reminder

on:
  pull_request:
    types: [opened]
    branches: [main, develop]

permissions:
  pull-requests: write
  contents: read

jobs:
  pr-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Get reviewers list and request review
        uses: actions/github-script@v7
        with:
          script: |
            const path = '.github/REVIEWERS';
            let reviewers = [];
            const baseRef = context.payload.pull_request.base.ref;
            const headRef = context.payload.pull_request.head.ref;
            const author = context.payload.pull_request.user.login;

            const readReviewers = async (ref) => {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref,
              });
              const content = Buffer.from(data.content, 'base64').toString('utf-8');
              return content
                .split(/\r?\n/)
                .map((line) => line.replace(/#.*/, '').trim())
                .filter((u) => u.length > 0);
            };

            try {
              reviewers = await readReviewers(baseRef);
              console.log(`Using REVIEWERS from base branch: ${baseRef}`);
            } catch (e) {
              try {
                reviewers = await readReviewers(headRef);
                console.log(`Using REVIEWERS from PR branch: ${headRef}`);
              } catch (e2) {
                console.log('REVIEWERS not found on base or PR branch, skipping');
              }
            }

            const filteredReviewers = reviewers.filter(r => r !== author);
            console.log(`PR author: ${author} — excluded from reviewers`);

            if (filteredReviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: filteredReviewers,
              });
              console.log(`Requested reviewers: ${filteredReviewers.join(', ')}`);
            }

      - name: Comment merge policy
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Merge policy reminder

              Before merging this PR, ensure:
              1. All CI and Security checks have **finished** and are **green**.
              2. The PR has **one approval** from a teammate (the author cannot approve their own PR).

              See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${context.payload.pull_request.base.ref}/CONTRIBUTING.md#merge-policy-mandatory) for details.`
            });
