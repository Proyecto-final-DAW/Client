name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings=0

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Check format
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css}"

      - name: Build
        run: npm run build
