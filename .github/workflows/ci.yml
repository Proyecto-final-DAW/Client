name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Match Server CI and the README's stated minimum so a
          # contributor switching nvm versions between the two repos
          # doesn't hit subtle build-target mismatches.
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        # Match Server CI: zero warnings tolerated. Without this flag
        # warnings creep in indefinitely and the contributing guide's
        # "no warnings allowed" rule stays aspirational. Calling eslint
        # directly avoids pnpm forwarding the `--` separator as a file arg.
        run: pnpm exec eslint . --max-warnings=0

      - name: TypeScript
        run: pnpm exec tsc --noEmit

      - name: Check format
        run: pnpm exec prettier --check "src/**/*.{js,jsx,ts,tsx,json,css}"

      - name: Build
        run: pnpm run build
