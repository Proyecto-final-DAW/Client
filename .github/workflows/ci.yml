name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Match Server CI and the README's stated minimum so a
          # contributor switching nvm versions between the two repos
          # doesn't hit subtle build-target mismatches.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        # Match Server CI: zero warnings tolerated. Without this flag
        # warnings creep in indefinitely and the contributing guide's
        # "no warnings allowed" rule stays aspirational.
        run: npm run lint -- --max-warnings=0

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Check format
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css}"

      - name: Build
        run: npm run build
